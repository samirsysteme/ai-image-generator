<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Image Generator</title>

<style>

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:45px;
margin-bottom:20px;
}

input{
width:60%;
padding:15px;
border-radius:12px;
border:none;
font-size:18px;
}

button{
padding:15px 35px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
font-size:18px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#16a34a;
}

img{
margin-top:40px;
max-width:700px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.loader{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<h1>🤖 AI Image Generator</h1>

<input id="prompt" placeholder="اكتب ما تريد رسمه...">

<button onclick="draw()">ارسم</button>

<div class="loader" id="loading">⏳ جاري الرسم...</div>

<br>

<img id="result">

<script>

function draw(){

let text = document.getElementById("prompt").value;

if(text==""){
alert("اكتب وصف الصورة");
return;
}

document.getElementById("loading").style.display="block";

let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(text);

let img = document.getElementById("result");

img.onload = function(){
document.getElementById("loading").style.display="none";
}

img.src = url;

}

</script>

</body>
</html>
