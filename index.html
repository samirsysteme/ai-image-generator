<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Image Generator</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
}

input{
width:60%;
padding:15px;
border-radius:10px;
border:none;
font-size:18px;
}

button{
padding:15px 30px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

img{
margin-top:30px;
max-width:600px;
border-radius:20px;
}

#loading{
display:none;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🤖 AI Image Generator</h1>

<input id="prompt" placeholder="اكتب وصف الصورة">

<button onclick="draw()">ارسم</button>

<div id="loading">⏳ جاري الرسم...</div>

<br>

<img id="result">

<script>

async function draw(){

let text=document.getElementById("prompt").value;

if(text===""){
alert("اكتب وصف الصورة");
return;
}

document.getElementById("loading").style.display="block";

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(text);

document.getElementById("result").src=url;

document.getElementById("result").onload=function(){
document.getElementById("loading").style.display="none";
}

}

</script>

</body>
</html>
