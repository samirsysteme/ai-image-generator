<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Image Generator</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.input-box{
margin-top:30px;
}

input{
width:60%;
padding:15px;
border-radius:10px;
border:none;
font-size:18px;
outline:none;
}

button{
padding:15px 30px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#16a34a;
}

#loading{
margin-top:20px;
display:none;
font-size:18px;
}

img{
margin-top:40px;
max-width:700px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<h1>🤖 AI Image Generator</h1>

<div class="input-box">

<input id="prompt" placeholder="اكتب ما تريد رسمه">

<button onclick="draw()">ارسم</button>

</div>

<div id="loading">⏳ جاري الرسم...</div>

<img id="result">

<script>

function draw(){

let text = document.getElementById("prompt").value;

if(text===""){
alert("اكتب وصف الصورة");
return;
}

document.getElementById("loading").style.display="block";

let url = "https://image.pollinations.ai/prompt/" 
+ encodeURIComponent(text) 
+ "?width=1024&height=1024&seed=" + Date.now();

let img = document.getElementById("result");

img.onload = function(){
document.getElementById("loading").style.display="none";
}

img.onerror = function(){
document.getElementById("loading").innerText="⚠️ حدث خطأ في تحميل الصورة";
}

img.src = url;

}

</script>

</body>
</html>
